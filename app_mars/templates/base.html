<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="../static/css/style.css">
    <title>{{ title }}</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #8B0000 0%, #B22222 100%) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            padding: 10px 20px;
            font-size: 2rem;
        }
        header h4 {
            color: #FFD700;
            text-align: center;
            margin: 20px 0;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .nav-links {
            position: absolute;
            right: 20px;
            top: 15px;
        }
        .nav-links a {
            color: white !important;
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .nav-links a:hover {
            color: #FFD700 !important;
            transform: scale(1.1);
        }
        .btn-custom {
            background: linear-gradient(135deg, #8B0000 0%, #B22222 100%);
            border: none;
            color: white;
            padding: 10px 30px;
            margin: 0 10px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139,0,0,0.3);
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <h1>🚀 Mission colonization of Mars</h1>
            <div class="nav-links">
                {% if current_user.is_authenticated %}
                    <a href="/index">📋 journal</a>
                    <a href="/logout">🚪 log out</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <h4>✨ "Apple trees will bloom on Mars." ✨</h4>
    {% if not current_user.is_authenticated %}
        <div class="text-center mb-4">
            <a class="btn btn-custom" href="/register">📝 Registration</a>
            <a class="btn btn-custom" href="/login">🔐 Log in</a>
        </div>
    {% endif %}
</header>
<main role="main" class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
